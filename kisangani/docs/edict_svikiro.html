    <p><strong>[The First Edict of the Svikiro]</strong></p>
<blockquote>
<p><strong>Section 1: The Human Conscience</strong></p>
<p><strong><strong>masvikiro ndi vanhu.</strong> <strong>masvikiro vanadudzira matura a vadzimu.</strong></strong></p>
<p><strong>Section 2: The Ancestral Evidential</strong></p>
<p><strong><strong>masvikiro vanatungamiradzimu nyika na njere ya vadzimu.</strong> <strong>utajiri wa bahari ndi mombe.</strong></strong></p>
</blockquote>

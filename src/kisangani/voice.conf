# src/kisangani/voice.conf
# TTS voice configuration for Kisangani Basic, sourced by tools/synth_audio.sh.
#
# Kisangani Basic is Shona-derived (Bantu, fully open-syllable CV
# phonotactics), so a Swahili voice renders its morphological structure and
# tonal cadence far closer to the authentic soundscape than any European
# voice would. -10% slows the cadence to let the agglutinative morphology
# breathe (see .agents/skills/speak-kisangani/SKILL.md).

VOICE="sw-TZ-RehemaNeural"
RATE="-10%"

# Per-signage-register override, keyed by the src/kisangani/<subdir> name.
declare -A REGISTER_VOICE=(
  ["Gov_and_Legal"]="sw-TZ-DaudiNeural"
  ["diagetic_samples"]="sw-TZ-DaudiNeural"
  ["Graffiti_and_Informal"]="sw-KE-ZuriNeural"
  ["Commercial_and_Tourist"]="sw-TZ-RehemaNeural"
  ["Hazard_Markings"]="sw-TZ-RehemaNeural"
)
